name = "onyx-edge-bridge"
main = "src/index.ts"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

[vars]
ALLOWED_ORIGINS = "http://localhost:5173,https://axim.us.com"
CORE_API_URL = "https://api.axim-core.internal"
SUPABASE_URL = "https://your-supabase-project.supabase.co"

# --- SECRETS DOCUMENTATION ---
# The following secrets MUST be securely bound via the environment vault:
# Use `wrangler secret put <SECRET_NAME>` to set these in production.
#
# - SUPABASE_SERVICE_ROLE_KEY
# - AXIM_ONYX_SECRET
# - ANTHROPIC_API_KEY
# - AXIM_SERVICE_KEY


# Wake the worker at 8:00 AM UTC (2:00 AM CST) daily
[triggers]
crons = ["0 0 * * *", "*/15 * * * *"] # Daily digest and 15-minute SLA sweeps

# --- KV NAMESPACE BINDINGS ---

[[kv_namespaces]]
binding = "KB_CACHE"
id = "64c11d5bc7f64a5dbc20673d9688b4f7"

[[kv_namespaces]]
binding = "IDEMPOTENCY_KV"
id = "ee8e5d5f13be45c9a91042cbd5e042df"

[[kv_namespaces]]
binding = "STATUS_KV"
id = "fake-status-kv-id-for-now"
